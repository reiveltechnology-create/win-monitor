<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WIN MONITOR // operador</title>
<style>
  /* ============ DESIGN TOKENS ============ */
  :root {
    --bg: #0a0d10;
    --bg-elev: #11161b;
    --bg-elev-2: #161c23;
    --line: #1f2730;
    --line-bright: #2c3744;
    --text: #d8e0e8;
    --text-dim: #6b7785;
    --text-mute: #4a5563;
    --green: #00ff88;
    --green-dim: #00b366;
    --red: #ff3855;
    --red-dim: #b3253b;
    --yellow: #ffb000;
    --blue: #4ab8ff;
    --purple: #b87aff;
    --warn-bg: #1a1308;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  @font-face {
    font-family: 'JetBrainsMono';
    src: local('JetBrains Mono'), local('Menlo'), local('Consolas'), local('Courier New');
    font-display: swap;
  }

  body {
    font-family: 'JetBrains Mono', 'Menlo', 'Consolas', 'Courier New', monospace;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    line-height: 1.4;
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 20% 0%, rgba(74, 184, 255, 0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(0, 255, 136, 0.03) 0%, transparent 50%);
  }

  /* ============ HEADER ============ */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-elev);
  }
  .brand {
    display: flex; align-items: baseline; gap: 12px;
  }
  .brand h1 {
    font-size: 14px; font-weight: 700; letter-spacing: 0.18em;
    color: var(--green);
  }
  .brand .sub {
    font-size: 11px; color: var(--text-mute); letter-spacing: 0.1em;
  }
  .status {
    display: flex; align-items: center; gap: 18px;
    font-size: 11px; color: var(--text-dim);
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-mute); display: inline-block; margin-right: 6px;
  }
  .dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  .dot.err  { background: var(--red); box-shadow: 0 0 8px var(--red); }
  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  .voice-toggle {
    display: flex; align-items: center; gap: 6px;
    cursor: pointer; padding: 6px 12px;
    border: 1px solid var(--line-bright); border-radius: 2px;
    background: var(--bg-elev-2); color: var(--text);
    font-family: inherit; font-size: 11px; letter-spacing: 0.08em;
    transition: all 0.15s;
  }
  .voice-toggle:hover { border-color: var(--green); color: var(--green); }
  .voice-toggle.on { border-color: var(--green); color: var(--green); background: rgba(0, 255, 136, 0.08); }

  /* ============ TICKER STRIP ============ */
  .ticker-strip {
    display: flex; gap: 0; padding: 0;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
  }
  .ticker-cell {
    flex: 1; padding: 10px 16px;
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column; gap: 2px;
  }
  .ticker-cell:last-child { border-right: none; }
  .ticker-cell .lbl {
    font-size: 10px; color: var(--text-mute); letter-spacing: 0.12em; text-transform: uppercase;
  }
  .ticker-cell .val {
    font-size: 16px; font-weight: 700; color: var(--text);
  }
  .ticker-cell .val.green { color: var(--green); }
  .ticker-cell .val.red { color: var(--red); }
  .ticker-cell .val.yellow { color: var(--yellow); }

  /* ============ MAIN GRID ============ */
  main {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 380px;
    gap: 1px;
    background: var(--line);
  }
  @media (max-width: 1100px) { main { grid-template-columns: 1fr; } }

  .panel {
    background: var(--bg);
    padding: 18px 24px;
    min-height: calc(100vh - 110px);
  }
  .panel-title {
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    font-size: 11px; letter-spacing: 0.16em; color: var(--text-mute);
    text-transform: uppercase;
  }
  .panel-title::before {
    content: ''; width: 12px; height: 1px; background: var(--green);
  }
  .panel-title .count {
    margin-left: auto; color: var(--text-dim); font-size: 10px;
  }

  /* ============ RANGE FILTER ============ */
  .range-filter {
    display: flex; gap: 0;
    margin-left: 16px;
    border: 1px solid var(--line-bright);
    border-radius: 2px;
    overflow: hidden;
  }
  .range-filter button {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 4px 12px;
    cursor: pointer;
    border-right: 1px solid var(--line-bright);
    transition: all 0.15s;
  }
  .range-filter button:last-child { border-right: none; }
  .range-filter button:hover { color: var(--text); background: var(--bg-elev-2); }
  .range-filter button.active {
    background: var(--green);
    color: var(--bg);
    font-weight: 700;
  }

  /* ============ EVENT CARD ============ */
  .event {
    background: var(--bg-elev);
    border-left: 3px solid var(--line-bright);
    margin-bottom: 8px;
    padding: 12px 16px;
    transition: all 0.2s;
    position: relative;
  }
  .event:hover { background: var(--bg-elev-2); }

  .event.released { border-left-color: var(--text-dim); }
  .event.bullish { border-left-color: var(--green); }
  .event.bearish { border-left-color: var(--red); }
  .event.upcoming { border-left-color: var(--yellow); background: var(--warn-bg); }

  .event.upcoming::after {
    content: 'IMINENTE';
    position: absolute; top: 12px; right: 16px;
    font-size: 9px; letter-spacing: 0.16em;
    color: var(--yellow); animation: pulse 1s infinite;
  }

  .event-row {
    display: grid;
    grid-template-columns: 95px 60px 1fr auto;
    gap: 12px; align-items: center;
  }

  .event-time { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; }
  .event-meta { display: flex; flex-direction: column; gap: 2px; font-size: 10px; }
  .event-country {
    font-weight: 700; letter-spacing: 0.1em;
    color: var(--blue);
  }
  .event-country.br { color: var(--green); }
  .event-stars { color: var(--yellow); letter-spacing: 0.05em; }

  .event-name {
    font-size: 13px; font-weight: 500; color: var(--text);
  }
  .event-ref { font-size: 10px; color: var(--text-mute); margin-top: 2px; }

  .event-data {
    display: flex; gap: 14px; font-size: 11px;
  }
  .event-data .field {
    display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
  }
  .event-data .field-lbl { color: var(--text-mute); font-size: 9px; letter-spacing: 0.1em; }
  .event-data .field-val { font-weight: 700; }
  .event-data .field-val.actual { color: var(--text); }
  .event-data .field-val.forecast { color: var(--text-dim); }

  .event-bias {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--line);
    display: flex; gap: 14px; align-items: center; font-size: 11px;
  }
  .bias-tag {
    padding: 2px 8px; font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
    border: 1px solid;
  }
  .bias-tag.BULLISH { color: var(--green); border-color: var(--green); background: rgba(0, 255, 136, 0.08); }
  .bias-tag.BEARISH { color: var(--red); border-color: var(--red); background: rgba(255, 56, 85, 0.08); }
  .bias-tag.NEUTRAL { color: var(--text-dim); border-color: var(--line-bright); }
  .bias-tag.PENDING { color: var(--yellow); border-color: var(--yellow); }

  .surprise { color: var(--text-dim); font-size: 10px; }
  .surprise strong { color: var(--text); }

  .event-notes {
    margin-top: 6px; font-size: 10px; color: var(--text-dim);
    font-style: italic;
  }

  /* ============ BLOCO DE IMPACTO (quando evento sai) ============ */
  .impact-box {
    margin-top: 10px;
    padding: 10px 14px;
    border-left: 3px solid;
    background: var(--bg-elev-2);
    font-size: 11px;
    line-height: 1.5;
  }
  .impact-box.BULLISH { border-left-color: var(--green); background: rgba(0, 255, 136, 0.04); }
  .impact-box.BEARISH { border-left-color: var(--red); background: rgba(255, 56, 85, 0.04); }
  .impact-box.NEUTRAL { border-left-color: var(--text-dim); }

  .impact-header {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .impact-header.BULLISH { color: var(--green); }
  .impact-header.BEARISH { color: var(--red); }
  .impact-header.NEUTRAL { color: var(--text); }
  .impact-arrow {
    font-size: 16px; line-height: 1;
  }
  .impact-summary {
    color: var(--text); font-size: 11px;
  }
  .impact-summary strong {
    color: var(--text);
  }
  .impact-meta {
    margin-top: 4px; color: var(--text-dim); font-size: 10px;
    display: flex; gap: 14px; flex-wrap: wrap;
  }
  .impact-meta .lbl {
    color: var(--text-mute); margin-right: 4px;
  }
  .impact-meta strong {
    color: var(--text);
  }

  /* Destaque visual para evento já liberado */
  .event.released-highlight {
    background: linear-gradient(90deg, var(--bg-elev) 0%, var(--bg-elev-2) 100%);
  }
  .event-row .actual.bull-val { color: var(--green); font-size: 13px; }
  .event-row .actual.bear-val { color: var(--red); font-size: 13px; }

  /* ============ LOG ============ */
  .log {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    height: calc(100vh - 180px);
    overflow-y: auto;
    padding: 14px 16px;
    font-size: 11px;
  }
  .log-line {
    padding: 4px 0; border-bottom: 1px dashed var(--line);
    display: grid; grid-template-columns: 60px auto 1fr;
    gap: 10px; align-items: baseline;
  }
  .log-time { color: var(--text-mute); font-size: 10px; }
  .log-tag {
    padding: 1px 6px; font-size: 9px; font-weight: 700;
    letter-spacing: 0.1em;
  }
  .log-tag.RELEASE { color: var(--green); }
  .log-tag.UPCOMING { color: var(--yellow); }
  .log-tag.SYS { color: var(--text-dim); }
  .log-tag.ERR { color: var(--red); }
  .log-msg { color: var(--text); }

  /* ============ EMPTY STATE ============ */
  .empty {
    text-align: center; padding: 40px 20px;
    color: var(--text-mute); font-size: 12px;
  }

  /* ============ SETTINGS BUTTON & MODAL ============ */
  .settings-btn {
    display: flex; align-items: center; gap: 6px;
    cursor: pointer; padding: 6px 12px;
    border: 1px solid var(--line-bright); border-radius: 2px;
    background: var(--bg-elev-2); color: var(--text);
    font-family: inherit; font-size: 11px; letter-spacing: 0.08em;
    transition: all 0.15s;
  }
  .settings-btn:hover { border-color: var(--blue); color: var(--blue); }

  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.75);
    z-index: 100;
    align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg-elev);
    border: 1px solid var(--line-bright);
    width: 480px; max-width: 92vw;
    max-height: 90vh; overflow-y: auto;
    padding: 24px 28px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  }
  .modal h2 {
    font-size: 13px; letter-spacing: 0.16em; color: var(--green);
    margin-bottom: 18px; padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal .close-x {
    background: none; border: none; color: var(--text-dim);
    font-size: 18px; cursor: pointer; padding: 0 4px;
  }
  .modal .close-x:hover { color: var(--red); }

  .field-group {
    margin-bottom: 16px;
  }
  .field-group label {
    display: block; font-size: 10px; letter-spacing: 0.12em;
    color: var(--text-mute); text-transform: uppercase; margin-bottom: 6px;
  }
  .field-group select, .field-group input[type="range"] {
    width: 100%;
    font-family: inherit; font-size: 12px;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--line-bright);
    padding: 8px 10px;
    border-radius: 2px;
  }
  .field-group select:focus, .field-group input[type="range"]:focus {
    outline: none; border-color: var(--green);
  }
  .field-group .range-row {
    display: grid; grid-template-columns: 1fr 50px;
    gap: 12px; align-items: center;
  }
  .field-group .range-val {
    text-align: right; font-size: 12px; color: var(--green);
    font-weight: 700;
  }

  .preview-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-top: 18px;
    padding-top: 16px; border-top: 1px solid var(--line);
  }
  .preview-btn {
    padding: 10px;
    background: var(--bg-elev-2);
    border: 1px solid var(--line-bright);
    color: var(--text);
    font-family: inherit; font-size: 11px;
    letter-spacing: 0.08em; cursor: pointer;
    transition: all 0.15s;
  }
  .preview-btn:hover { border-color: var(--green); color: var(--green); }

  .modal .save-row {
    margin-top: 18px;
    display: flex; justify-content: flex-end; gap: 8px;
  }
  .modal .save-btn {
    padding: 10px 20px;
    background: var(--green); color: var(--bg);
    border: none; font-family: inherit; font-weight: 700;
    font-size: 11px; letter-spacing: 0.12em; cursor: pointer;
  }
  .modal .save-btn:hover { background: var(--green-dim); }

  /* ============ SCROLLBAR ============ */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--line-bright); }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-mute); }

  /* ============ SELETOR DE PERÍODO ============ */
  .period-tabs {
    display: flex; gap: 0; padding: 0;
    border-bottom: 1px solid var(--line);
    background: var(--bg-elev);
  }
  .period-tab {
    padding: 10px 22px;
    font-family: inherit; font-size: 11px; letter-spacing: 0.14em;
    text-transform: uppercase;
    background: transparent; border: none;
    color: var(--text-mute);
    cursor: pointer;
    border-right: 1px solid var(--line);
    transition: all 0.15s;
    position: relative;
  }
  .period-tab:hover { color: var(--text); background: var(--bg-elev-2); }
  .period-tab.active {
    color: var(--green);
    background: var(--bg);
  }
  .period-tab.active::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: -1px;
    height: 2px; background: var(--green);
  }
  .period-tab .count {
    margin-left: 8px; color: var(--text-mute); font-weight: 700;
  }
  .period-tab.active .count { color: var(--green); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>WIN MONITOR</h1>
    <span class="sub">// pregão · mini índice · 2-3 ★</span>
  </div>
  <div class="status">
    <span id="connStatus"><span class="dot"></span>conectando...</span>
    <span id="clockNow">--:--:--</span>
    <button id="voiceBtn" class="voice-toggle">
      <span id="voiceIcon">◯</span>
      <span id="voiceLabel">VOZ OFF</span>
    </button>
    <button id="settingsBtn" class="settings-btn" title="Configurações de voz">
      <span>⚙</span>
      <span>CONFIG</span>
    </button>
  </div>
</header>

<div class="ticker-strip">
  <div class="ticker-cell">
    <span class="lbl">eventos próximos</span>
    <span class="val" id="kpiTotal">--</span>
  </div>
  <div class="ticker-cell">
    <span class="lbl">já liberados</span>
    <span class="val" id="kpiReleased">--</span>
  </div>
  <div class="ticker-cell">
    <span class="lbl">tend. alta</span>
    <span class="val green" id="kpiBull">--</span>
  </div>
  <div class="ticker-cell">
    <span class="lbl">tend. baixa</span>
    <span class="val red" id="kpiBear">--</span>
  </div>
  <div class="ticker-cell">
    <span class="lbl">próximo evento</span>
    <span class="val yellow" id="kpiNext">--</span>
  </div>
</div>

<main>
  <section class="panel">
    <div class="panel-title">
      Agenda
      <div class="range-filter" id="rangeFilter">
        <button data-range="today">HOJE</button>
        <button data-range="tomorrow">AMANHÃ</button>
        <button data-range="week" class="active">SEMANA</button>
      </div>
      <span class="count" id="eventsCount">0</span>
    </div>
    <div id="eventsList"></div>
  </section>

  <section class="panel">
    <div class="panel-title">
      Log de eventos
      <span class="count" id="logCount">0</span>
    </div>
    <div id="log" class="log"></div>
  </section>
</main>

<!-- ============ MODAL DE CONFIGURAÇÕES ============ -->
<div id="settingsModal" class="modal-overlay">
  <div class="modal">
    <h2>
      <span>// CONFIGURAÇÕES DE VOZ</span>
      <button class="close-x" id="closeModalBtn">✕</button>
    </h2>

    <div class="field-group">
      <label for="cfgVoice">Voz</label>
      <select id="cfgVoice"></select>
    </div>

    <div class="field-group">
      <label for="cfgRate">Velocidade da fala</label>
      <div class="range-row">
        <input type="range" id="cfgRate" min="0.5" max="2" step="0.1" value="1">
        <span class="range-val" id="cfgRateVal">1.0x</span>
      </div>
    </div>

    <div class="field-group">
      <label for="cfgPitch">Tom (grave ↔ agudo)</label>
      <div class="range-row">
        <input type="range" id="cfgPitch" min="0.5" max="2" step="0.1" value="1">
        <span class="range-val" id="cfgPitchVal">1.0</span>
      </div>
    </div>

    <div class="field-group">
      <label for="cfgVolume">Volume</label>
      <div class="range-row">
        <input type="range" id="cfgVolume" min="0" max="1" step="0.05" value="1">
        <span class="range-val" id="cfgVolumeVal">100%</span>
      </div>
    </div>

    <div class="field-group">
      <label for="cfgAnnounceAhead">Antecedência do aviso (antes do evento)</label>
      <select id="cfgAnnounceAhead">
        <option value="30">30 segundos</option>
        <option value="60">1 minuto</option>
        <option value="120">2 minutos</option>
        <option value="180">3 minutos</option>
        <option value="300">5 minutos</option>
        <option value="600">10 minutos</option>
        <option value="900">15 minutos</option>
      </select>
    </div>

    <div class="field-group">
      <label for="cfgAlertSound">Som de alerta (antes da fala)</label>
      <select id="cfgAlertSound">
        <option value="none">Nenhum</option>
        <option value="beep">Beep curto</option>
        <option value="ding">Ding (sino)</option>
        <option value="chime">Chime (notificação)</option>
        <option value="bell">Sino duplo</option>
        <option value="alert">Alerta urgente</option>
        <option value="bloomberg">Bloomberg (clássico)</option>
      </select>
    </div>

    <div class="preview-row">
      <button class="preview-btn" id="previewAlertBtn">▶ Testar som</button>
      <button class="preview-btn" id="previewVoiceBtn">▶ Testar voz</button>
    </div>

    <div class="save-row">
      <button class="save-btn" id="saveSettingsBtn">SALVAR</button>
    </div>
  </div>
</div>


<script>
  // ============ ESTADO ============
  const state = {
    events: [],
    voiceOn: false,
    sse: null,
    logEntries: [],
    range: 'week'   // 'today' | 'tomorrow' | 'week'
  };

  // ============ CONFIGURAÇÕES PERSISTENTES ============
  const DEFAULT_SETTINGS = {
    voiceURI: '',                 // voz escolhida (será preenchida com 1ª pt-BR)
    rate: 1.0,                    // velocidade da fala
    pitch: 1.0,                   // tom (grave/agudo)
    volume: 1.0,                  // volume 0-1
    alertSound: 'ding',           // som antes da fala
    announceAheadSec: 300,        // segundos antes do evento pra avisar (default 5 min)
    soundToVoiceDelayMs: null     // ms entre som e voz (null = auto, baseado no som)
  };

  function loadSettings() {
    try {
      const raw = localStorage.getItem('winMonitorVoiceSettings');
      if (raw) return { ...DEFAULT_SETTINGS, ...JSON.parse(raw) };
    } catch (_) {}
    return { ...DEFAULT_SETTINGS };
  }

  function saveSettings(s) {
    try {
      localStorage.setItem('winMonitorVoiceSettings', JSON.stringify(s));
    } catch (_) {}
  }

  state.settings = loadSettings();

  // Carrega range salvo no localStorage
  try {
    const savedRange = localStorage.getItem('winMonitorRange');
    if (savedRange && ['today', 'tomorrow', 'week'].includes(savedRange)) {
      state.range = savedRange;
    }
  } catch (_) {}

  // ============ VOZ (Web Speech API) ============
  const synth = window.speechSynthesis;
  let availableVoices = [];
  let chosenVoice = null;

  function refreshVoices() {
    availableVoices = synth.getVoices();
    // Filtra prioridade: pt-BR > pt > resto
    availableVoices.sort((a, b) => {
      const score = v => (/pt(-|_)BR/i.test(v.lang) ? 0 : /^pt/i.test(v.lang) ? 1 : 2);
      return score(a) - score(b);
    });
    // Aplica voz salva ou primeira pt-BR
    if (state.settings.voiceURI) {
      chosenVoice = availableVoices.find(v => v.voiceURI === state.settings.voiceURI);
    }
    if (!chosenVoice) {
      chosenVoice = availableVoices.find(v => /Google.*pt(-|_)BR/i.test(v.name))
                 || availableVoices.find(v => /pt(-|_)BR/i.test(v.lang))
                 || availableVoices[0]
                 || null;
    }
    populateVoiceSelect();
  }

  refreshVoices();
  if (synth.onvoiceschanged !== undefined) {
    synth.onvoiceschanged = refreshVoices;
  }

  // ============ SOM DE ALERTA (WebAudio - sem arquivos) ============
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  // Gera um tom simples: freq Hz, duração ms, tipo de onda, volume relativo
  function tone(freq, durMs, type = 'sine', vol = 0.3, delayMs = 0) {
    const ctx = getAudioCtx();
    const startTime = ctx.currentTime + delayMs / 1000;
    const endTime = startTime + durMs / 1000;

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    osc.connect(gain);
    gain.connect(ctx.destination);

    // Envelope ADSR simples (evita "clique")
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(vol * state.settings.volume, startTime + 0.01);
    gain.gain.setValueAtTime(vol * state.settings.volume, endTime - 0.05);
    gain.gain.linearRampToValueAtTime(0, endTime);

    osc.start(startTime);
    osc.stop(endTime);
  }

  // Retorna a duração total em ms do som tocado, pra atrasar a fala
  function playAlertSound(kind) {
    switch (kind) {
      case 'beep':
        tone(880, 120, 'sine', 0.35);
        return 150;
      case 'ding':
        tone(1320, 250, 'sine', 0.3);
        return 280;
      case 'chime':
        tone(1046, 150, 'sine', 0.25);
        tone(1318, 250, 'sine', 0.25, 130);
        return 420;
      case 'bell':
        tone(1568, 180, 'triangle', 0.3);
        tone(1568, 180, 'triangle', 0.3, 220);
        return 450;
      case 'alert':
        tone(880, 100, 'square', 0.25);
        tone(660, 100, 'square', 0.25, 120);
        tone(880, 100, 'square', 0.25, 240);
        return 380;
      case 'bloomberg':
        tone(1760, 80, 'sine', 0.35);
        tone(2093, 80, 'sine', 0.35, 90);
        tone(2637, 120, 'sine', 0.35, 180);
        return 340;
      case 'none':
      default:
        return 0;
    }
  }

  function speak(text) {
    if (!state.voiceOn || !synth) return;
    synth.cancel();

    const delay = playAlertSound(state.settings.alertSound);

    setTimeout(() => {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'pt-BR';
      u.rate = state.settings.rate;
      u.pitch = state.settings.pitch;
      u.volume = state.settings.volume;
      if (chosenVoice) u.voice = chosenVoice;
      synth.speak(u);
    }, delay);
  }

  // ============ POPULAR SELECT DE VOZES ============
  function populateVoiceSelect() {
    const sel = document.getElementById('cfgVoice');
    if (!sel) return;
    sel.innerHTML = '';
    if (!availableVoices.length) {
      sel.innerHTML = '<option>Nenhuma voz disponível</option>';
      return;
    }
    for (const v of availableVoices) {
      const opt = document.createElement('option');
      opt.value = v.voiceURI;
      // Detecta gênero pelo nome (heurística — funciona pras vozes mais comuns)
      const female = /female|feminin|maria|joana|luciana|fernanda|helena|google.*pt/i.test(v.name);
      const male = /male|masculin|daniel|paulo|ricardo|antonio/i.test(v.name);
      const genderTag = female ? ' ♀' : male ? ' ♂' : '';
      opt.textContent = `${v.name} [${v.lang}]${genderTag}`;
      if (chosenVoice && chosenVoice.voiceURI === v.voiceURI) opt.selected = true;
      sel.appendChild(opt);
    }
  }

  // ============ MODAL HANDLERS ============

  // ============ FORMATADORES DE FALA ============
  function speakUpcoming(ev) {
    const country = ev.country === 'BR' ? 'Brasil' : 'Estados Unidos';
    // Usa secondsUntil se fornecido, senão converte minutesUntil pra segundos.
    const secs = ev.secondsUntil != null ? ev.secondsUntil
               : (ev.minutesUntil != null ? ev.minutesUntil * 60 : 300);

    let whenLabel;
    if (secs < 90) {
      whenLabel = `em ${secs} segundos`;
    } else {
      const mins = Math.round(secs / 60);
      whenLabel = mins === 1 ? 'em 1 minuto' : `em ${mins} minutos`;
    }
    speak(`Atenção. ${ev.event}. ${country}. ${whenLabel}.`);
    logEvent('UPCOMING', `${ev.country} ${ev.event} (${whenLabel})`);
  }

  // Compara actual vs previous quando não há forecast — usa pra dar uma
  // tendência aproximada baseada na direção do indicador.
  function inferBiasFromPrevious(ev) {
    if (!ev.actual || !ev.previous) return ev.bias;
    const cmp = compareValues(ev.actual, ev.previous);
    if (!cmp || cmp.diff === 0) return 'NEUTRAL';
    const above = cmp.diff > 0;
    switch (ev.direction) {
      case 'hawkish_bad':  return above ? 'BEARISH' : 'BULLISH';
      case 'hawkish_good': return above ? 'BULLISH' : 'BEARISH';
      case 'dovish_good':  return above ? 'BEARISH' : 'BULLISH';
      default:             return 'NEUTRAL';
    }
  }

  function speakRelease(ev) {
    // Formato: "Nome do evento. PAÍS. Tendência X. Impacto típico entre A e B pontos."
    const country = ev.country === 'BR' ? 'Brasil' : 'Estados Unidos';

    // Se não temos forecast, tenta inferir bias do comparativo com previous
    let effectiveBias = ev.bias;
    if (effectiveBias === 'PENDING' && ev.actual && ev.previous) {
      effectiveBias = inferBiasFromPrevious(ev);
    }

    const tendencia = {
      BULLISH: 'tendência de alta',
      BEARISH: 'tendência de baixa',
      NEUTRAL: 'tendência neutra',
      PENDING: ''  // sem projeção e sem previous - só anuncia o evento
    }[effectiveBias] || '';

    let phrase = `${ev.event}. ${country}. `;

    if (tendencia) {
      phrase += `${tendencia}.`;
    } else {
      // Sem forecast e sem previous — anuncia que saiu pra atenção
      phrase += 'Notícia divulgada, atenção ao mercado.';
    }

    // Impacto típico em pontos do WIN (só quando há viés direcional)
    if ((effectiveBias === 'BULLISH' || effectiveBias === 'BEARISH')
        && Array.isArray(ev.typicalRange) && ev.typicalRange.length === 2) {
      phrase += ` Impacto típico entre ${ev.typicalRange[0]} e ${ev.typicalRange[1]} pontos.`;
    }

    speak(phrase.trim());
    logEvent('RELEASE', `${ev.country} ${ev.event} → ${effectiveBias}${ev.actual ? ` (${ev.actual} vs ${ev.forecast || ev.previous})` : ''}`);
  }

  // ============ RENDER DA AGENDA ============
  function fmtTime(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  // Compara dois valores numéricos extraindo só o número (ignora %, K, M, etc)
  function compareValues(actualStr, forecastStr) {
    const parseNum = (s) => {
      if (s == null) return null;
      const m = String(s).replace(',', '.').match(/-?\d+(?:\.\d+)?/);
      if (!m) return null;
      let n = parseFloat(m[0]);
      if (/K\b/i.test(s)) n *= 1000;
      else if (/M\b/i.test(s)) n *= 1000000;
      else if (/B\b/i.test(s)) n *= 1000000000;
      return n;
    };
    const a = parseNum(actualStr);
    const f = parseNum(forecastStr);
    if (a == null || f == null) return null;
    return { actual: a, forecast: f, diff: a - f };
  }

  function fmtDateLabel(iso) {
    const d = new Date(iso);
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const evDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const diffDays = Math.round((evDay - today) / (24 * 60 * 60 * 1000));

    const date = d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }); // ex: 12/05
    const weekday = d.toLocaleDateString('pt-BR', { weekday: 'short' })
                     .replace('.', '').toUpperCase();                                  // ex: SEG, TER, QUA

    if (diffDays === 0) return `HOJE · ${date}`;
    if (diffDays === 1) return `AMANHÃ · ${date}`;
    if (diffDays === -1) return `ONTEM · ${date}`;
    return `${weekday} ${date}`;
  }

  function renderEvents() {
    const list = document.getElementById('eventsList');
    if (!state.events.length) {
      list.innerHTML = `<div class="empty">// sem eventos 2-3★ programados //</div>`;
      updateKPIs();
      return;
    }

    list.innerHTML = state.events.map(ev => {
      const stars = '★'.repeat(ev.stars) + '☆'.repeat(3 - ev.stars);
      const flag = ev.country === 'BR' ? 'br' : 'us';

      // Se não temos forecast, infere bias do actual vs previous
      let displayBias = ev.bias;
      if (ev.released && displayBias === 'PENDING' && ev.actual && ev.previous) {
        displayBias = inferBiasFromPrevious(ev);
      }

      const tendenciaLabel = {
        BULLISH: 'TENDÊNCIA DE ALTA',
        BEARISH: 'TENDÊNCIA DE BAIXA',
        NEUTRAL: 'TENDÊNCIA NEUTRA',
        PENDING: 'NOTÍCIA DIVULGADA'
      }[displayBias] || displayBias;

      const tendenciaArrow = {
        BULLISH: '▲',
        BEARISH: '▼',
        NEUTRAL: '◆',
        PENDING: '◆'
      }[displayBias] || '';

      // Destaque colorido no valor atual conforme o viés
      const actualValueClass = ev.released
        ? (displayBias === 'BULLISH' ? 'bull-val' : displayBias === 'BEARISH' ? 'bear-val' : '')
        : '';

      // === BLOCO DE IMPACTO (quando saiu o número) ===
      let impactBlock = '';
      if (ev.released) {
        // Comparativo principal: actual vs forecast OU actual vs previous
        const cmpFcst = (ev.actual != null && ev.forecast != null)
          ? compareValues(ev.actual, ev.forecast)
          : null;
        const cmpPrev = (ev.actual != null && ev.previous != null)
          ? compareValues(ev.actual, ev.previous)
          : null;

        // Resumo legível em português
        let resumo = `Saiu <strong>${ev.actual ?? '—'}</strong>`;
        if (ev.forecast != null && cmpFcst) {
          resumo += `, esperado era <strong>${ev.forecast}</strong>`;
          resumo += cmpFcst.diff > 0
            ? ` — <strong>acima</strong> da projeção`
            : cmpFcst.diff < 0
              ? ` — <strong>abaixo</strong> da projeção`
              : ` — <strong>em linha</strong> com a projeção`;
        } else if (ev.previous != null && cmpPrev) {
          resumo += `, anterior <strong>${ev.previous}</strong>`;
          resumo += cmpPrev.diff > 0
            ? ` — <strong>acelerou</strong> em relação ao anterior`
            : cmpPrev.diff < 0
              ? ` — <strong>desacelerou</strong> em relação ao anterior`
              : ` — <strong>estável</strong> em relação ao anterior`;
        }
        resumo += '.';

        const faixa = (Array.isArray(ev.typicalRange) && ev.typicalRange.length === 2)
          ? `${ev.typicalRange[0]}–${ev.typicalRange[1]} pts WIN`
          : null;

        const surpriseStr = (ev.surprise != null && !isNaN(ev.surprise) && Math.abs(ev.surprise) > 0)
          ? `${ev.surprise > 0 ? '+' : ''}${ev.surprise.toFixed(1)}%`
          : null;

        const magnitudeStr = {
          large: 'grande', medium: 'moderada', small: 'pequena', unknown: '—'
        }[ev.magnitude] || ev.magnitude;

        const metaParts = [];
        if (surpriseStr) metaParts.push(`<span><span class="lbl">surpresa:</span><strong>${surpriseStr}</strong> (${magnitudeStr})</span>`);
        if (faixa && (displayBias === 'BULLISH' || displayBias === 'BEARISH'))
          metaParts.push(`<span><span class="lbl">impacto típico:</span><strong>${faixa}</strong></span>`);

        const headerSuffix = (displayBias === 'BULLISH' || displayBias === 'BEARISH')
          ? ' no mini índice' : '';

        impactBlock = `
          <div class="impact-box ${displayBias}">
            <div class="impact-header ${displayBias}">
              <span class="impact-arrow">${tendenciaArrow}</span>
              <span>${tendenciaLabel}${headerSuffix}</span>
            </div>
            <div class="impact-summary">${resumo}</div>
            ${metaParts.length ? `<div class="impact-meta">${metaParts.join('')}</div>` : ''}
          </div>
        `;
      }

      // Atualiza klass para usar displayBias também
      const klassReleased = ev.released
        ? (displayBias === 'BULLISH' ? 'bullish released-highlight'
          : displayBias === 'BEARISH' ? 'bearish released-highlight'
          : 'released released-highlight')
        : '';

      return `
        <div class="event ${klassReleased}" data-id="${ev.id}">
          <div class="event-row">
            <div class="event-time">
              <div style="font-size: 9px; color: var(--text-mute); letter-spacing: 0.1em; margin-bottom: 2px;">${fmtDateLabel(ev.datetime)}</div>
              ${fmtTime(ev.datetime)}
            </div>
            <div class="event-meta">
              <span class="event-country ${flag}">${ev.country}</span>
              <span class="event-stars">${stars}</span>
            </div>
            <div>
              <div class="event-name">${ev.event}</div>
              ${ev.reference ? `<div class="event-ref">${ev.reference}</div>` : ''}
            </div>
            <div class="event-data">
              <div class="field">
                <span class="field-lbl">ATUAL</span>
                <span class="field-val actual ${actualValueClass}">${ev.actual ?? '—'}${ev.unit && ev.actual ? ev.unit : ''}</span>
              </div>
              <div class="field">
                <span class="field-lbl">PREV</span>
                <span class="field-val forecast">${ev.forecast ?? '—'}${ev.unit && ev.forecast ? ev.unit : ''}</span>
              </div>
              <div class="field">
                <span class="field-lbl">ANT</span>
                <span class="field-val forecast">${ev.previous ?? '—'}${ev.unit && ev.previous ? ev.unit : ''}</span>
              </div>
            </div>
          </div>
          ${impactBlock}
          ${ev.notes ? `<div class="event-notes">${ev.notes}</div>` : ''}
        </div>
      `;
    }).join('');

    document.getElementById('eventsCount').textContent = state.events.length;
    updateKPIs();
  }

  function updateKPIs() {
    const total = state.events.length;
    const released = state.events.filter(e => e.released).length;
    const bull = state.events.filter(e => e.released && e.bias === 'BULLISH').length;
    const bear = state.events.filter(e => e.released && e.bias === 'BEARISH').length;

    const next = state.events.find(e => !e.released && new Date(e.datetime) > new Date());
    const nextLabel = next ? `${fmtTime(next.datetime)} · ${next.country}` : '—';

    document.getElementById('kpiTotal').textContent = total;
    document.getElementById('kpiReleased').textContent = released;
    document.getElementById('kpiBull').textContent = bull;
    document.getElementById('kpiBear').textContent = bear;
    document.getElementById('kpiNext').textContent = nextLabel;
  }

  // ============ LOG ============
  function logEvent(tag, msg) {
    const time = new Date().toLocaleTimeString('pt-BR', { hour12: false });
    state.logEntries.unshift({ time, tag, msg });
    state.logEntries = state.logEntries.slice(0, 200);
    renderLog();
  }

  function renderLog() {
    const log = document.getElementById('log');
    document.getElementById('logCount').textContent = state.logEntries.length;
    if (!state.logEntries.length) {
      log.innerHTML = `<div class="empty">// log vazio //</div>`;
      return;
    }
    log.innerHTML = state.logEntries.map(e => `
      <div class="log-line">
        <span class="log-time">${e.time}</span>
        <span class="log-tag ${e.tag}">[${e.tag}]</span>
        <span class="log-msg">${e.msg}</span>
      </div>
    `).join('');
  }

  // ============ AGENDAMENTO LOCAL DE AVISOS ============
  // O servidor manda avisos baseado em ANNOUNCE_AHEAD_MIN (default 5min).
  // Mas o operador pode preferir 1min, 30s, 10min... Então o NAVEGADOR
  // ============ AGENDAMENTO LOCAL DE AVISOS ============
  // O servidor manda avisos via SSE, mas o NAVEGADOR também agenda os seus
  // próprios baseado em state.settings.announceAheadSec. Isso garante que:
  //  - A antecedência configurada pelo operador funcione
  //  - O aviso de release aconteça na hora exata do evento (mesmo se a fonte
  //    de dados demorar pra refletir o valor "actual")
  state.spokenUpcoming = new Set();
  state.spokenRelease = new Set();
  state.scheduledTimers = {};  // id -> [timer1, timer2] pra poder cancelar

  function scheduleClientAnnouncements() {
    const now = Date.now();
    const aheadMs = (state.settings.announceAheadSec || 300) * 1000;

    for (const ev of state.events) {
      const evTime = new Date(ev.datetime).getTime();

      // ===== 1) ANÚNCIO PRÉVIO (X minutos antes) =====
      if (!ev.released && !state.spokenUpcoming.has(ev.id)) {
        const triggerTime = evTime - aheadMs;
        const delay = triggerTime - now;

        if (delay < -10000) {
          // Janela já passou há mais de 10s - pula
        } else if (delay <= 0 && evTime > now) {
          // Estamos dentro da janela de aviso
          state.spokenUpcoming.add(ev.id);
          const secsUntil = Math.max(5, Math.round((evTime - now) / 1000));
          speakUpcoming({ ...ev, secondsUntil: secsUntil });
        } else if (delay > 0 && delay < 24 * 60 * 60 * 1000) {
          // Agenda
          state.spokenUpcoming.add(ev.id);
          const secsAhead = Math.round(aheadMs / 1000);
          const t = setTimeout(() => {
            speakUpcoming({ ...ev, secondsUntil: secsAhead });
          }, delay);
          (state.scheduledTimers[ev.id] = state.scheduledTimers[ev.id] || []).push(t);
        }
      }

      // ===== 2) ANÚNCIO DE RELEASE (na hora exata do evento) =====
      // Acontece independente do servidor detectar o actual — o cliente avisa
      // no horário do evento que "agora está saindo a notícia".
      if (!state.spokenRelease.has(ev.id)) {
        const releaseDelay = evTime - now;
        if (releaseDelay > 0 && releaseDelay < 24 * 60 * 60 * 1000) {
          // Agenda pra hora exata
          const t = setTimeout(() => {
            // Pega versão mais recente do evento (pode ter sido atualizado pelo SSE)
            const fresh = state.events.find(e => e.id === ev.id) || ev;
            if (state.spokenRelease.has(fresh.id)) return; // já foi falado pelo SSE
            state.spokenRelease.add(fresh.id);
            speakRelease(fresh);
          }, releaseDelay);
          (state.scheduledTimers[ev.id] = state.scheduledTimers[ev.id] || []).push(t);
        } else if (ev.released && releaseDelay <= 0 && releaseDelay >= -300000) {
          // Já está liberado, dentro dos últimos 5 min e ainda não falamos
          state.spokenRelease.add(ev.id);
          speakRelease(ev);
        }
      }
    }
  }

  // ============ FETCH ============
  async function loadEvents() {
    try {
      const res = await fetch(`/api/events?range=${state.range}`);
      state.events = await res.json();
      state.events.sort((a, b) => new Date(a.datetime) - new Date(b.datetime));
      renderEvents();
      scheduleClientAnnouncements();
    } catch (err) {
      logEvent('ERR', 'Falha ao carregar eventos: ' + err.message);
    }
  }

  // ============ HANDLER DOS BOTÕES DE RANGE ============
  function setupRangeFilter() {
    const filter = document.getElementById('rangeFilter');
    if (!filter) return;
    // Marca o botão ativo inicial
    filter.querySelectorAll('button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.range === state.range);
    });
    filter.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-range]');
      if (!btn) return;
      const r = btn.dataset.range;
      if (r === state.range) return;
      state.range = r;
      try { localStorage.setItem('winMonitorRange', r); } catch (_) {}
      filter.querySelectorAll('button').forEach(b => {
        b.classList.toggle('active', b.dataset.range === r);
      });
      loadEvents();
      logEvent('SYS', `Filtro alterado para: ${r === 'today' ? 'HOJE' : r === 'tomorrow' ? 'AMANHÃ' : 'SEMANA'}`);
    });
  }
  setupRangeFilter();

  // ============ SSE ============
  function connectSSE() {
    if (state.sse) state.sse.close();
    const sse = new EventSource('/api/stream');
    state.sse = sse;

    sse.addEventListener('hello', () => {
      setStatus('live', 'AO VIVO');
      logEvent('SYS', 'Conectado ao stream');
    });

    sse.addEventListener('refresh', (e) => {
      const data = JSON.parse(e.data);
      loadEvents();
    });

    sse.addEventListener('upcoming', (e) => {
      const ev = JSON.parse(e.data);
      // O cliente já agenda os avisos baseado em state.settings.announceAheadSec.
      // Só falamos pelo SSE se o cliente ainda não tiver falado desse evento.
      if (!state.spokenUpcoming.has(ev.id)) {
        state.spokenUpcoming.add(ev.id);
        speakUpcoming(ev);
      }
      loadEvents();
    });

    sse.addEventListener('release', (e) => {
      const ev = JSON.parse(e.data);
      if (!state.spokenRelease.has(ev.id)) {
        state.spokenRelease.add(ev.id);
        speakRelease(ev);
      }
      loadEvents();
    });

    sse.addEventListener('error', () => {
      setStatus('err', 'OFFLINE');
      logEvent('ERR', 'Conexão SSE caiu, tentando reconectar...');
      setTimeout(connectSSE, 3000);
    });
  }

  function setStatus(klass, label) {
    const el = document.getElementById('connStatus');
    el.innerHTML = `<span class="dot ${klass}"></span>${label}`;
  }

  // ============ RELÓGIO ============
  setInterval(() => {
    document.getElementById('clockNow').textContent =
      new Date().toLocaleTimeString('pt-BR', { hour12: false });
  }, 1000);

  // ============ INIT ============
  loadEvents();
  connectSSE();
  logEvent('SYS', 'WIN Monitor iniciado');
</script>
